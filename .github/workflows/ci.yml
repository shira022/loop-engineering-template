name: CI
on:
  push:
    branches: [main, develop, release/*, hotfix/*]
  pull_request:
    branches: [main, develop, release/*, hotfix/*]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate skills YAML
        run: python3 scripts/validate-skills.py
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        continue-on-error: true
        with:
          command: config
          globs: "**/*.md,!node_modules/**"

  skill-quality:
    name: Skill Quality
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python3 scripts/validate-skills.py
      - run: python3 scripts/validate-configs.py
      - run: python3 scripts/run-evals.py

  branch-validation:
    name: Branch Policy Validation
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Validate source/target branch policy
        run: |
          PR_SOURCE="${{ github.head_ref }}"
          PR_TARGET="${{ github.base_ref }}"

          # Allow dependabot branches (they follow their own convention)
          if echo "$PR_SOURCE" | grep -q '^dependabot/'; then
            echo "dependabot branch: $PR_SOURCE -> $PR_TARGET"
            exit 0
          fi

          case "$PR_SOURCE" in
            feature/*)
              if [ "$PR_TARGET" != "develop" ] && [ "$PR_TARGET" != "main" ]; then
                echo "feature/* branches must target develop or main"
                exit 1
              fi
              echo "feature -> $PR_TARGET: OK"
              ;;
            release/*)
              if [ "$PR_TARGET" != "main" ] && [ "$PR_TARGET" != "develop" ]; then
                echo "release/* branches must target main or develop"
                exit 1
              fi
              echo "release -> $PR_TARGET: OK"
              ;;
            hotfix/*)
              if [ "$PR_TARGET" != "main" ] && [ "$PR_TARGET" != "develop" ]; then
                echo "hotfix/* branches must target main or develop"
                exit 1
              fi
              echo "hotfix -> $PR_TARGET: OK"
              ;;
            develop)
              if [ "$PR_TARGET" != "main" ]; then
                echo "develop branch must target main"
                exit 1
              fi
              echo "develop -> main: OK"
              ;;
            main)
              echo "PRs from main not allowed"
              exit 1
              ;;
            *)
              echo "non-standard branch: $PR_SOURCE -> $PR_TARGET"
              ;;
          esac
          echo "Branch policy check passed"
