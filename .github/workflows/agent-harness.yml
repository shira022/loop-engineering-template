name: Agent Harness
on:
  workflow_dispatch:
    inputs:
      task:
        description: "Task description for the agent to execute"
        required: true
        type: string
      agent:
        description: "Agent to use for execution"
        required: true
        default: stub
        type: choice
        options:
          - hermes
          - opencode
          - claude
          - stub
  # Scheduled automations: daily CI triage (weekdays at 07:00 UTC)
  schedule:
    - cron: '0 7 * * 1-5'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-agent:
    name: Agent Execution (${{ inputs.agent || 'scheduled' }})
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create branch
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            BRANCH="automation/daily-triage/$(date +%Y%m%d)"
          else
            BRANCH="agent/${{ github.actor }}/$(date +%s)"
          fi
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Determine task
        id: task
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            TASK="Run daily CI triage: check latest CI runs on main, open issues, recent commits. Categorize findings. Write triage report to learnings/triage-$(date +%F).md"
          else
            TASK="${{ inputs.task }}"
          fi
          echo "TASK=$TASK" >> $GITHUB_ENV

      - name: Install agent (${{ inputs.agent || 'stub' }})
        run: |
          AGENT="${{ inputs.agent }}"
          [ -z "$AGENT" ] && AGENT="stub"
          case "$AGENT" in
            hermes)
              echo "::group::Install Hermes Agent"
              pip install hermes-agent 2>/dev/null || echo "⚠️  Hermes install failed, using stub mode"
              echo "::endgroup::"
              ;;
            opencode)
              echo "::group::Install Opencode"
              npm install -g @opencode/opencode 2>/dev/null || echo "⚠️  Opencode install failed, using stub mode"
              echo "::endgroup::"
              ;;
            claude)
              echo "::group::Install Claude Code"
              npm install -g @anthropic/claude-code 2>/dev/null || echo "⚠️  Claude Code install failed, using stub mode"
              echo "::endgroup::"
              ;;
          esac

      - name: Run agent task
        id: agent-run
        run: |
          echo "::notice title=Agent Task::${{ env.TASK }}"
          bash scripts/agent-runner.sh "${AGENT:-stub}" "${{ env.TASK }}"
          echo "status=completed" >> $GITHUB_OUTPUT

      - name: Commit agent changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "${{ env.TASK }}"
          git push origin "$BRANCH"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: "${{ steps.branch.outputs.branch }}"
          base: develop
          title: "${{ env.TASK }}"
          body: |
            ## 🤖 Automated Agent Run
            
            **Task:** ${{ env.TASK }}
            **Agent:** ${{ inputs.agent || 'scheduled' }}
            **Trigger:** ${{ github.event_name }}
            
            This PR was automatically created by the Agent Harness workflow.
            Please review the changes before merging.
          labels: |
            automated
            agent-run
          add-paths: |
            learnings/
            traces/
