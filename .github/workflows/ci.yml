name: CI
on:
  push:
    branches: [main, develop, release/*, hotfix/*]
  pull_request:
    branches: [main, develop, release/*, hotfix/*]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check YAML frontmatter in skills
        run: |
          python3 scripts/validate-skills.py
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        continue-on-error: true
        with:
          command: config
          globs: |
            **/*.md
            !node_modules/**

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lang:
          - id: python
            deps: pip install pytest
            test_cmd: python -m pytest tests/ || echo "no tests"
            setup: ""
          - id: node
            deps: npm ci || npm install
            test_cmd: npm test 2>/dev/null || echo "no test script"
            setup: ""
          - id: rust
            deps: ""
            test_cmd: cargo test 2>/dev/null || echo "no tests"
            setup: ""
          - id: go
            deps: ""
            test_cmd: go test ./... 2>/dev/null || echo "no tests"
            setup: ""
      fail-fast: false

    steps:
      - uses: actions/checkout@v7
      - name: Setup (${{ matrix.lang.id }})
        run: |
          if [ "${{ matrix.lang.id }}" = "python" ]; then
            ${{ matrix.lang.setup }}
          fi
      - name: Install dependencies (${{ matrix.lang.id }})
        run: ${{ matrix.lang.deps }}
      - name: Test (${{ matrix.lang.id }})
        run: ${{ matrix.lang.test_cmd }}
      - name: Detect project
        run: |
          echo "Project language detection:"
          test -f pyproject.toml && echo "  Python: pyproject.toml found"
          test -f package.json && echo "  Node.js: package.json found"
          test -f Cargo.toml && echo "  Rust: Cargo.toml found"
          test -f go.mod && echo "  Go: go.mod found"

  # hotfix/release ブランチでは branch 情報を検証
  branch-validation:
    name: Branch Policy Validation
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate source/target branch policy
        run: |
          PR_SOURCE="${{ github.head_ref }}"
          PR_TARGET="${{ github.base_ref }}"

          case "$PR_SOURCE" in
            feature/*)
              if [ "$PR_TARGET" != "develop" ]; then
                echo "❌ feature/* ブランチは develop にのみマージ可能です"
                exit 1
              fi
              echo "✅ feature → develop: OK"
              ;;
            release/*)
              if [ "$PR_TARGET" != "main" ] && [ "$PR_TARGET" != "develop" ]; then
                echo "❌ release/* ブランチは main または develop にのみマージ可能です"
                exit 1
              fi
              echo "✅ release → $PR_TARGET: OK"
              ;;
            hotfix/*)
              if [ "$PR_TARGET" != "main" ] && [ "$PR_TARGET" != "develop" ]; then
                echo "❌ hotfix/* ブランチは main または develop にのみマージ可能です"
                exit 1
              fi
              echo "✅ hotfix → $PR_TARGET: OK"
              ;;
            develop)
              if [ "$PR_TARGET" != "main" ]; then
                echo "❌ develop ブランチは main にのみマージ可能です"
                exit 1
              fi
              echo "✅ develop → main: OK"
              ;;
            *)
              # main→他やその他のブランチへの PR は禁止（ルールで制御）
              if [ "$PR_SOURCE" = "main" ]; then
                echo "❌ main からの PR は許可されていません"
                exit 1
              fi
              echo "⚠️  非標準ブランチ名です: $PR_SOURCE → $PR_TARGET"
              ;;
          esac
