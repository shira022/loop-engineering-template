name: Agent Harness
on:
  workflow_dispatch:
    inputs:
      task:
        description: "Task description for the agent to execute"
        required: true
        type: string
      agent:
        description: "Agent to use for execution"
        required: true
        default: stub
        type: choice
        options:
          - hermes
          - opencode
          - claude
          - stub

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-agent:
    name: Agent Execution (${{ inputs.agent }})
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create branch
        run: |
          BRANCH="agent/${{ github.actor }}/$(date +%s)"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Install agent (${{ inputs.agent }})
        run: |
          case "${{ inputs.agent }}" in
            hermes)
              echo "::group::Install Hermes Agent"
              pip install hermes-agent 2>/dev/null || echo "⚠️  Hermes install failed, using stub mode"
              echo "::endgroup::"
              ;;
            opencode)
              echo "::group::Install Opencode"
              npm install -g @opencode/opencode 2>/dev/null || echo "⚠️  Opencode install failed, using stub mode"
              echo "::endgroup::"
              ;;
            claude)
              echo "::group::Install Claude Code"
              npm install -g @anthropic/claude-code 2>/dev/null || echo "⚠️  Claude Code install failed, using stub mode"
              echo "::endgroup::"
              ;;
          esac

      - name: Run agent task
        id: agent-run
        run: |
          echo "::notice title=Agent Task::${{ inputs.task }}"
          bash scripts/agent-runner.sh "${{ inputs.agent }}" "${{ inputs.task }}"
          echo "status=completed" >> $GITHUB_OUTPUT

      - name: Commit agent changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "agent: ${{ inputs.task }}"
          git push origin "$BRANCH"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ${{ env.BRANCH }}
          base: main
          title: "agent: ${{ inputs.task }}"
          body: |-
            ## Agent Task Execution

            **Agent:** ${{ inputs.agent }}
            **Task:** ${{ inputs.task }}
            **Triggered by:** ${{ github.actor }}

            ---

            This PR was automatically created by the Agent Harness workflow.
            Review the changes and modify as needed before merging.
          commit-message: "agent: ${{ inputs.task }}"

      - name: Summary
        run: |
          echo "## Agent Harness Results" >> $GITHUB_STEP_SUMMARY
          echo "- **Agent:** ${{ inputs.agent }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Task:** ${{ inputs.task }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ env.BRANCH }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ Completed" >> $GITHUB_STEP_SUMMARY

  compatibility-check:
    name: Compatibility Check (${{ matrix.agent }})
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        agent: [hermes, opencode, claude]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pyyaml
      - name: Validate skill frontmatter
        run: python3 scripts/validate-skills.py
      - name: Run eval harness
        run: python3 scripts/run-evals.py
      - name: Check .agents/skills structure
        run: |
          errors=0
          for skill in .agents/skills/*/; do
            name=$(basename "$skill")
            if [ -f "${skill}SKILL.md" ]; then
              echo "  ✅ $name/SKILL.md"
            else
              echo "  ❌ $name/SKILL.md missing"
              errors=$((errors+1))
            fi
            if [ -f "${skill}evals/evals.json" ]; then
              echo "  ✅ $name/evals/evals.json"
            else
              echo "  ⚠️  $name/evals/evals.json missing"
            fi
          done
          exit $errors
      - name: Summary
        run: |
          echo "## Agent Compatibility: ${{ matrix.agent }}" >> $GITHUB_STEP_SUMMARY
          echo "- Agent: ${{ matrix.agent }}" >> $GITHUB_STEP_SUMMARY
          echo "- Skill validation: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Eval harness: ✅" >> $GITHUB_STEP_SUMMARY
