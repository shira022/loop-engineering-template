<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Loop Engineering Template — AI-agent-driven development methodology.">
  <meta property="og:title" content="🔄 Loop Engineering Template">
  <meta property="og:url" content="https://shira022.github.io/loop-engineering-template/">
  <title>🔄 Loop Engineering Template</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔄</text></svg>">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.css">
</head>
<body>
  <div id="app"></div>

  <!-- SPA fallback: redirect unknown path to hash-based URL -->
  <script>
    (function() {
      var base = '/loop-engineering-template';
      var path = window.location.pathname;
      if (path.startsWith(base + '/')) {
        var rest = path.slice(base.length + 1).replace(/\.md$/i, '');
        if (rest && !window.location.hash) {
          window.location.replace(base + '/#/' + rest);
        }
      }
    })();
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script>
    window.$docsify = {
      name: '🔄 Loop Engineering',
      repo: 'shira022/loop-engineering-template',
      loadSidebar: true,
      subMaxLevel: 3,
      search: 'auto',
      copyCode: { buttonText: '📋 Copy' },
      themeColor: '#4a9eff',
      basePath: '/loop-engineering-template/',
      relativePath: true,
      auto2top: true
    };
  </script>
</body>
</html>
