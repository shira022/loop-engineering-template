name: CI
on:
  push:
    branches: [main, develop, release/*, hotfix/*]
  pull_request:
    branches: [main, develop, release/*, hotfix/*]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate skills YAML
        run: python3 scripts/validate-skills.py
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        continue-on-error: true
        with:
          command: config
          globs: "**/*.md,!node_modules/**"

  skill-quality:
    name: Skill Quality
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python3 scripts/validate-skills.py
      - run: python3 scripts/run-evals.py

  build-and-test:
    name: Build and Test (${{ matrix.lang.id }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lang:
          - id: python
            deps: pip install ".[dev]"
            test_cmd: python -m pytest tests/ --cov=src --cov-fail-under=80
          - id: node
            deps: test -f package.json && npm ci || true
            test_cmd: |
              if [ ! -f package.json ]; then
                echo "::error::package.json not found"
                exit 1
              fi
              npm test || { echo "::error::Tests failed"; exit 1; }
          - id: rust
            deps: ""
            test_cmd: cargo test || { echo "::error::No Rust tests"; exit 1; }
          - id: go
            deps: ""
            test_cmd: go test ./... || { echo "::error::No Go tests"; exit 1; }
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - if: matrix.lang.deps != ""
        run: ${{ matrix.lang.deps }}
      - run: ${{ matrix.lang.test_cmd }}

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          test -f coverage.xml && echo "Python coverage: generated" >> $GITHUB_STEP_SUMMARY || true
          test -f coverage/lcov.info && echo "Node.js coverage: generated" >> $GITHUB_STEP_SUMMARY || true
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "Test files:" >> $GITHUB_STEP_SUMMARY
          find . -path "*/test*" \( -name "*.py" -o -name "*.ts" -o -name "*.rs" -o -name "*.go" \) 2>/dev/null \
            | sed "s|^./|- |" >> $GITHUB_STEP_SUMMARY || true

  branch-validation:
    name: Branch Policy Validation
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - run: |
          SOURCE="${{ github.head_ref }}"
          TARGET="${{ github.base_ref }}"
          echo "Source: $SOURCE -> Target: $TARGET"
          if echo "$SOURCE" | grep -q "^dependabot/"; then
            echo "dependabot branch OK"; exit 0
          fi
          case "$SOURCE" in
            feature/*)  [ "$TARGET" = "develop" ] || { echo "feature must target develop"; exit 1; } ;;
            release/*)  [ "$TARGET" = "main" ] || [ "$TARGET" = "develop" ] || { echo "release must target main or develop"; exit 1; } ;;
            hotfix/*)   [ "$TARGET" = "main" ] || [ "$TARGET" = "develop" ] || { echo "hotfix must target main or develop"; exit 1; } ;;
            develop)    [ "$TARGET" = "main" ] || { echo "develop must target main"; exit 1; } ;;
            main)       echo "PRs from main not allowed"; exit 1 ;;
            *)          echo "non-standard branch: $SOURCE" ;;
          esac
          echo "Branch policy check passed"
